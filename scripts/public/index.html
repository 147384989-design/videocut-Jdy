<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>口播剪辑审核</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }

        header { background: #16213e; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #0f3460; }
        header h1 { font-size: 18px; color: #e94560; }
        .header-info { font-size: 14px; color: #888; }

        .main-container { flex: 1; display: flex; overflow: hidden; }

        /* 视频区域 */
        .video-section { flex: 1; display: flex; flex-direction: column; background: #0f0f1a; }
        .video-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 300px; }
        video { max-width: 100%; max-height: 100%; background: #000; }
        .controls { background: #16213e; padding: 15px; display: flex; gap: 10px; align-items: center; }
        .controls button { background: #e94560; border: none; color: white; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .controls button:hover { background: #c73e54; }
        .controls button:disabled { background: #555; cursor: not-allowed; }
        .time-display { color: #888; font-size: 14px; margin-left: auto; }
        .progress-bar { flex: 1; height: 6px; background: #333; border-radius: 3px; cursor: pointer; position: relative; }
        .progress-bar .filled { height: 100%; background: #e94560; border-radius: 3px; transition: width 0.1s; }
        .volume-control { display: flex; align-items: center; gap: 5px; }
        .volume-control input { width: 80px; }

        /* 审核列表 */
        .review-section { width: 400px; background: #16213e; border-left: 1px solid #0f3460; display: flex; flex-direction: column; }
        .review-header { padding: 15px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        .review-header h2 { font-size: 16px; }
        .review-stats { font-size: 12px; color: #888; }
        .review-list { flex: 1; overflow-y: auto; padding: 10px; }

        .item { background: #1a1a2e; margin-bottom: 8px; border-radius: 6px; overflow: hidden; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .item:hover { border-color: #0f3460; }
        .item.selected { border-color: #e94560; background: #2a1a2e; }
        .item-header { display: flex; align-items: center; padding: 10px 12px; gap: 10px; }
        .item input[type="checkbox"] { width: 18px; height: 18px; accent-color: #e94560; cursor: pointer; }
        .item-time { font-size: 12px; color: #e94560; font-family: monospace; min-width: 80px; }
        .item-type { font-size: 11px; padding: 2px 6px; border-radius: 3px; background: #0f3460; color: #888; }
        .item-type.silence { background: #4a1a1a; color: #ff6b6b; }
        .item-type.repetition { background: #1a3a1a; color: #6bff6b; }
        .item-type.filler { background: #3a3a1a; color: #ffff6b; }
        .item-text { padding: 8px 12px; font-size: 13px; color: #aaa; line-height: 1.4; }
        .item.auto { border-left: 3px solid #e94560; }

        /* 底部操作区 */
        .footer { background: #16213e; padding: 15px 20px; border-top: 1px solid #0f3460; display: flex; gap: 10px; justify-content: center; }
        .footer button { padding: 10px 30px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-execute { background: #e94560; color: white; }
        .btn-execute:hover { background: #c73e54; }
        .btn-export { background: #0f3460; color: white; }
        .btn-export:hover { background: #1a4a80; }
        .btn-select-all { background: #333; color: white; }
        .btn-select-all:hover { background: #444; }

        /* 快捷键提示 */
        .shortcuts { position: fixed; bottom: 70px; right: 20px; background: #16213e; padding: 10px 15px; border-radius: 8px; font-size: 12px; color: #666; }
        .shortcuts kbd { background: #333; padding: 2px 6px; border-radius: 3px; margin: 0 2px; }
    </style>
</head>
<body>
    <header>
        <h1>口播剪辑审核</h1>
        <div class="header-info" id="videoName">加载中...</div>
    </header>

    <div class="main-container">
        <div class="video-section">
            <div class="video-container">
                <video id="videoPlayer" controls>
                    <source id="videoSource" src="/api/video" type="video/mp4">
                    您的浏览器不支持视频播放
                </video>
            </div>
            <div class="controls">
                <button id="btnPlay" onclick="togglePlay()">▶ 播放</button>
                <button onclick="skipBack()">◀◀ 5s</button>
                <button onclick="skipForward()">▶▶ 5s</button>
                <div class="progress-bar" id="progressBar" onclick="seek(event)">
                    <div class="filled" id="progressFilled"></div>
                </div>
                <div class="volume-control">
                    <span>🔊</span>
                    <input type="range" min="0" max="1" step="0.1" value="1" onchange="setVolume(this.value)">
                </div>
                <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
            </div>
        </div>

        <div class="review-section">
            <div class="review-header">
                <h2>待审核项目</h2>
                <div class="review-stats" id="stats">加载中...</div>
            </div>
            <div class="review-list" id="reviewList">
                <!-- 项目列表 -->
            </div>
        </div>
    </div>

    <div class="footer">
        <button class="btn-select-all" onclick="selectAll()">全选</button>
        <button class="btn-select-all" onclick="deselectAll()">全取消</button>
        <button class="btn-export" onclick="exportList()">导出列表</button>
        <button class="btn-execute" onclick="executeCut()">执行剪辑</button>
    </div>

    <div class="shortcuts">
        <kbd>Space</kbd> 播放/暂停 &nbsp;
        <kbd>←</kbd><kbd>→</kbd> 跳转 &nbsp;
        <kbd>Enter</kbd> 跳到选中项
    </div>

    <script>
        let data = { segments: [], auto_selected: [], silences: [] };
        let selectedItems = new Set();
        let currentIndex = -1;

        // 加载数据
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                data = await res.json();
                renderList();
                updateStats();
            } catch (e) {
                console.error('加载数据失败:', e);
            }
        }

        // 渲染列表
        function renderList() {
            const list = document.getElementById('reviewList');
            const items = data.auto_selected || [];

            if (items.length === 0) {
                list.innerHTML = '<div style="padding:20px;text-align:center;color:#666;">没有检测到需要审核的项目</div>';
                return;
            }

            list.innerHTML = items.map((item, i) => `
                <div class="item ${selectedItems.has(i) ? 'selected' : ''} ${item.auto ? 'auto' : ''}"
                     onclick="toggleItem(${i})" data-index="${i}">
                    <div class="item-header">
                        <input type="checkbox" ${selectedItems.has(i) ? 'checked' : ''} onclick="event.stopPropagation(); toggleItem(${i})">
                        <span class="item-time">${formatTime(item.start)} - ${formatTime(item.end)}</span>
                        <span class="item-type ${item.type}">${getTypeLabel(item.type)}</span>
                    </div>
                    <div class="item-text">${item.text || item.duration ? `静音 ${item.duration?.toFixed(1)}s` : '未知'}</div>
                </div>
            `).join('');
        }

        // 更新统计
        function updateStats() {
            const total = (data.auto_selected || []).length;
            const selected = selectedItems.size;
            const autoCount = (data.auto_selected || []).filter(i => i.auto).length;
            document.getElementById('stats').textContent = `共 ${total} 项 | 已选 ${selected} | 自动 ${autoCount}`;
        }

        // 获取类型标签
        function getTypeLabel(type) {
            const labels = { silence: '静音', repetition: '重复', filler: '语气词' };
            return labels[type] || type;
        }

        // 格式化时间
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // 切换选中
        function toggleItem(index) {
            if (selectedItems.has(index)) {
                selectedItems.delete(index);
            } else {
                selectedItems.add(index);
            }
            renderList();
            updateStats();
        }

        // 全选
        function selectAll() {
            const items = data.auto_selected || [];
            selectedItems = new Set(items.map((_, i) => i));
            renderList();
            updateStats();
        }

        // 全取消
        function deselectAll() {
            selectedItems.clear();
            renderList();
            updateStats();
        }

        // 视频控制
        const video = document.getElementById('videoPlayer');

        function togglePlay() {
            if (video.paused) {
                video.play();
                document.getElementById('btnPlay').textContent = '⏸ 暂停';
            } else {
                video.pause();
                document.getElementById('btnPlay').textContent = '▶ 播放';
            }
        }

        function skipBack() { video.currentTime -= 5; }
        function skipForward() { video.currentTime += 5; }
        function setVolume(v) { video.volume = v; }

        function seek(e) {
            const rect = e.target.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const ratio = x / rect.width;
            video.currentTime = ratio * video.duration;
        }

        video.addEventListener('timeupdate', () => {
            const pct = (video.currentTime / video.duration) * 100;
            document.getElementById('progressFilled').style.width = pct + '%';
            document.getElementById('timeDisplay').textContent =
                `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`;
        });

        // 导出列表
        function exportList() {
            const selected = Array.from(selectedItems).map(i => data.auto_selected[i]);
            const content = JSON.stringify(selected, null, 2);
            const blob = new Blob([content], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'delete_list.json';
            a.click();
        }

        // 执行剪辑
        async function executeCut() {
            const confirmed = {
                to_delete: Array.from(selectedItems).map(i => data.auto_selected[i])
            };

            if (confirmed.to_delete.length === 0) {
                alert('请选择要删除的片段');
                return;
            }

            if (!confirm(`确定要删除 ${confirmed.to_delete.length} 个片段吗？`)) {
                return;
            }

            // 保存确认数据
            await fetch('/api/data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(confirmed)
            });

            // 触发剪辑
            const res = await fetch('/api/execute-cut', { method: 'POST' });
            const result = await res.json();

            if (result.success) {
                alert('剪辑完成！');
                video.src = result.output + '?t=' + Date.now();
            } else {
                alert('剪辑失败: ' + (result.error || '未知错误'));
            }
        }

        // 快捷键
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;

            switch(e.key) {
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowLeft':
                    skipBack();
                    break;
                case 'ArrowRight':
                    skipForward();
                    break;
                case 'Enter':
                    if (currentIndex >= 0 && currentIndex < selectedItems.size) {
                        const item = data.auto_selected[currentIndex];
                        if (item) {
                            video.currentTime = item.start;
                        }
                    }
                    break;
            }
        });

        // 初始化
        loadData();
    </script>
</body>
</html>
